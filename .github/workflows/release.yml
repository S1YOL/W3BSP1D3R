name: Build release bundles

# Builds fully self-contained W3BSP1D3R bundles (Python + all dependencies AND a
# headless Chromium for the --render / --interact features baked in — nothing to
# install) for Linux, Windows, and macOS, and attaches them to the matching
# GitHub Release.
#
# Runs automatically when a release is published, and can be triggered by hand
# from the Actions tab (useful for attaching bundles to an existing release).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the bundles to (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }} bundle
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies + Playwright + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml rich defusedxml pyyaml fpdf2 flask httpx playwright pyinstaller

      # Chromium's system libraries are only needed to LAUNCH the browser during
      # the smoke test below. Playwright invokes sudo itself for the apt step, so
      # this runs with the Python that actually has Playwright installed.
      # End users on desktop Linux normally already have these libs; minimal or
      # headless servers may need a one-time `playwright install-deps`.
      - name: Install Chromium system libs (Linux, for smoke test)
        if: matrix.platform == 'linux'
        run: python -m playwright install-deps chromium

      # Fetch Chromium into a folder we then copy into the bundle, so the browser
      # ships inside the release archive (no `playwright install` needed by users).
      - name: Fetch Chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
        run: python -m playwright install chromium

      # Runtime hook: point Playwright at the bundled browser and make its
      # binaries executable (in case the archive tooling drops the +x bit).
      - name: Write PyInstaller runtime hook
        shell: bash
        run: |
          cat > pyi_rth_playwright.py <<'EOF'
          import os, sys, stat
          def _find_browsers():
              cands = []
              if hasattr(sys, "_MEIPASS"):
                  cands.append(os.path.join(sys._MEIPASS, "pw-browsers"))
              exe_dir = os.path.dirname(sys.executable)
              cands.append(os.path.join(exe_dir, "_internal", "pw-browsers"))
              cands.append(os.path.join(exe_dir, "pw-browsers"))
              for c in cands:
                  if os.path.isdir(c):
                      return c
              return None
          _bp = _find_browsers()
          if _bp:
              os.environ.setdefault("PLAYWRIGHT_BROWSERS_PATH", _bp)
              if os.name != "nt":
                  for _root, _dirs, _files in os.walk(_bp):
                      for _f in _files:
                          _p = os.path.join(_root, _f)
                          try:
                              os.chmod(_p, os.stat(_p).st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
                          except OSError:
                              pass
          EOF

      # Note: the browser is NOT passed to PyInstaller (--add-data). PyInstaller
      # would try to ad-hoc codesign the Chromium binary on macOS and fail. We
      # copy it into the finished bundle in the next step instead.
      - name: Build standalone bundle
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --name W3BSP1D3R \
            --collect-submodules scanner \
            --collect-all fpdf \
            --collect-all playwright \
            --runtime-hook pyi_rth_playwright.py \
            main.py

      - name: Copy bundled Chromium into the build
        shell: bash
        run: |
          B="dist/W3BSP1D3R"
          if [ -d "$B/_internal" ]; then DEST="$B/_internal/pw-browsers"; else DEST="$B/pw-browsers"; fi
          cp -a pw-browsers "$DEST"
          echo "Chromium copied to $DEST"

      - name: Add docs and example config to the bundle
        shell: bash
        run: |
          B="dist/W3BSP1D3R"
          cp README.md LICENSE RELEASE_NOTES_v1.0.0.md w3bsp1d3r.example.yaml "$B"/ 2>/dev/null || true
          cp -r examples "$B"/ 2>/dev/null || true
          if [ "${{ matrix.platform }}" = "windows" ]; then
            printf 'Unzip this folder anywhere, then run W3BSP1D3R.exe from a terminal:\r\n\r\n    W3BSP1D3R.exe --url https://target.example.com\r\n\r\nJavaScript/SPA scanning works out of the box:\r\n\r\n    W3BSP1D3R.exe --url https://spa.example.com --render --interact\r\n\r\nNo Python, no browser install, no setup required.\r\n' > "$B/HOW-TO-RUN.txt"
          else
            printf 'Extract this folder anywhere, then run:\n\n    ./W3BSP1D3R --url https://target.example.com\n\nJavaScript/SPA scanning works out of the box:\n\n    ./W3BSP1D3R --url https://spa.example.com --render --interact\n\nNo Python, no browser install, no setup required.\n' > "$B/HOW-TO-RUN.txt"
          fi

      - name: Smoke-test the bundle (CLI + bundled Chromium actually launches)
        shell: bash
        env:
          # Force the frozen interpreter's stdout/stderr unbuffered. When output
          # is a pipe (as under $(...) here) Python block-buffers it, and a dirty
          # process exit — e.g. Playwright's Node driver teardown on Windows —
          # can discard the buffer before it's flushed, swallowing the very
          # "Headless browser started" line this test greps for. Unbuffered means
          # each line hits the pipe the instant it's printed.
          PYTHONUNBUFFERED: "1"
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then BIN="./dist/W3BSP1D3R/W3BSP1D3R.exe"; else BIN="./dist/W3BSP1D3R/W3BSP1D3R"; fi
          # 1) CLI loads
          "$BIN" --help >/dev/null
          # 2) bundled Chromium launches: serve a tiny JS page and render it
          mkdir -p smoke
          printf '<html><body><script>document.body.innerHTML="<a href=\\"/x\\">x</a>";</script></body></html>' > smoke/index.html
          python -m http.server 8000 --directory smoke >/dev/null 2>&1 &
          SRV=$!
          sleep 3
          set +e
          OUT="$("$BIN" --url http://127.0.0.1:8000 --render --max-pages 1 --scan-type passive 2>&1)"
          CODE=$?
          set -e
          kill "$SRV" 2>/dev/null || true
          echo "----- scanner output (exit code $CODE) -----"
          echo "$OUT"
          echo "--------------------------------------------"
          # Explicit launch failure — the browser could not start at all.
          if echo "$OUT" | grep -qi "Failed to start headless browser\|Playwright is not installed"; then
            echo "::error::Render smoke test FAILED — bundled Chromium did not launch"; exit 1
          fi
          # Success = the browser announced it started OR a page came back tagged
          # "(rendered)" (which only the headless-browser code path ever prints).
          if echo "$OUT" | grep -q "Headless browser started" || echo "$OUT" | grep -q "(rendered)"; then
            echo "Render smoke test PASSED — bundled Chromium launched"
          else
            echo "::error::Render smoke test FAILED — no confirmation the browser started"; exit 1
          fi

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          cd dist
          if [ "${{ matrix.platform }}" = "windows" ]; then
            ASSET="W3BSP1D3R-${TAG}-windows.zip"
            7z a "$ASSET" W3BSP1D3R >/dev/null
          else
            ASSET="W3BSP1D3R-${TAG}-${{ matrix.platform }}.tar.gz"
            tar -czf "$ASSET" W3BSP1D3R
          fi
          echo "asset=dist/$ASSET" >> "$GITHUB_OUTPUT"
          echo "Built $ASSET"

      - name: Upload bundle to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.pkg.outputs.tag }}" "${{ steps.pkg.outputs.asset }}" \
            --repo "${{ github.repository }}" --clobber
